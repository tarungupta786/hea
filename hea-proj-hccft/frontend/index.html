<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEA — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-wrapper fade-in">
  <div class="login-box">
    <div class="login-logo">
      <h1>HEA</h1>
      <p>Hospital Emergency Allocation System</p>
    </div>

    <div class="form-group" style="margin-bottom:16px;">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" value="admin" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom:24px;">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" value="admin123" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:10px;" onclick="login()">Sign In</button>

    <p style="text-align:center;margin-top:16px;font-size:12px;color:#6b6b6b;">
      Default: <strong>admin</strong> / <strong>admin123</strong>
    </p>
    <div id="login-error" style="color:#c62828;font-size:12px;text-align:center;margin-top:10px;display:none;"></div>
  </div>
</div>

<script>
  function login() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    if (u === 'admin' && p === 'admin123') {
      sessionStorage.setItem('hea_auth', '1');
      window.location.href = 'dashboard.html';
    } else {
      const err = document.getElementById('login-error');
      err.textContent = 'Invalid username or password.';
      err.style.display = 'block';
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  // Skip login if already authenticated
  if (sessionStorage.getItem('hea_auth')) window.location.href = 'dashboard.html';
</script>
</script>

<!-- Floating Chatbot Snippet -->
<div id="floating-chat">
  <div class="chat-btn" onclick="document.getElementById('chatWrap').classList.toggle('open')">💬</div>
  <div class="chat-window" id="chatWrap">
    <div class="chat-header">
      <span>AI Patient Assistant</span>
      <span style="cursor: pointer;" onclick="document.getElementById('chatWrap').classList.remove('open')">✖</span>
    </div>
    <div class="chat-body" style="background:#f9fafb;">
      <div style="background: var(--blue-light); color: var(--blue-mid); padding: 12px; border-radius: 12px 12px 12px 0; margin-bottom: 12px; width: fit-content; box-shadow:var(--shadow);">
        Hello! I'm the HEA Assistant. How can I help you today?
      </div>
    </div>
    <div class="chat-input" style="background:white;">
      <input type="text" placeholder="Type a message..." style="box-shadow:inset 0 1px 3px rgba(0,0,0,0.05);">
      <button class="btn btn-primary btn-sm" style="border-radius:20px;" onclick="alert('Chat logic will be implemented later.')">Send</button>
    </div>
  </div>
</div>

</body>
</html>
