<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEA — Bed Map</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-logo">HEA <span>Hospital Emergency Allocation</span></div>
  <nav class="header-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="beds.html" class="active">Beds</a>
    <a href="forecast.html">Forecast</a>
    <a href="reports.html">Reports</a>
    <a href="register-hospital.html">Register Hospital</a>
  </nav>
</header>

<main class="main fade-in">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
    <div class="page-title" style="border:none;">Bed Map</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;" id="ward-tabs">
      <button class="btn btn-primary btn-sm" onclick="filterWard(null,this)">All Wards</button>
    </div>
  </div>

  <!-- Legend -->
  <div style="display:flex;gap:16px;margin-bottom:16px;font-size:12px;">
    <div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:14px;border-radius:3px;background:#e8f5e9;border:1px solid #a5d6a7;"></div>Available</div>
    <div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:14px;border-radius:3px;background:#ffebee;border:1px solid #ef9a9a;"></div>Occupied</div>
    <div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:14px;border-radius:3px;background:#f5f5f5;border:1px solid #d0d0d0;"></div>Maintenance</div>
  </div>

  <div id="beds-container"></div>
</main>

<!-- Bed Status Modal -->
<div class="modal-overlay" id="bed-modal">
  <div class="modal-box" style="max-width:340px;">
    <div class="modal-title" id="bed-modal-title">Bed</div>
    <p style="font-size:13px;margin-bottom:16px;">
      Current status: <span id="bed-current-status" class="badge"></span>
    </p>
    <p style="font-size:12px;color:#6b6b6b;margin-bottom:14px;">Change status to:</p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button id="set-available"   class="btn btn-success btn-sm">✓ Mark Available</button>
      <button id="set-occupied"    class="btn btn-sm" style="background:#c62828;color:white;">● Mark Occupied</button>
      <button id="set-maintenance" class="btn btn-outline btn-sm">⚙ Mark Maintenance</button>
    </div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-outline btn-sm" onclick="closeBedModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/charts.js"></script>
<script src="js/beds.js"></script>

<!-- Floating Chatbot Snippet -->
<div id="floating-chat">
  <div class="chat-btn" onclick="document.getElementById('chatWrap').classList.toggle('open')">💬</div>
  <div class="chat-window" id="chatWrap">
    <div class="chat-header">
      <span>AI Patient Assistant</span>
      <span style="cursor: pointer;" onclick="document.getElementById('chatWrap').classList.remove('open')">✖</span>
    </div>
    <div class="chat-body" style="background:#f9fafb;">
      <div style="background: var(--blue-light); color: var(--blue-mid); padding: 12px; border-radius: 12px 12px 12px 0; margin-bottom: 12px; width: fit-content; box-shadow:var(--shadow);">
        Hello! I'm the HEA Assistant. How can I help you today?
      </div>
    </div>
    <div class="chat-input" style="background:white;">
      <input type="text" placeholder="Type a message..." style="box-shadow:inset 0 1px 3px rgba(0,0,0,0.05);">
      <button class="btn btn-primary btn-sm" style="border-radius:20px;" onclick="alert('Chat logic will be implemented later.')">Send</button>
    </div>
  </div>
</div>

</body>
</html>
